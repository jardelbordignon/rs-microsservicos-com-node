name: checkout-service

services:
  checkout-service-db:
    container_name: checkout-service-db
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-checkout_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-postgres}
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - ./checkout_db_data:/var/lib/postgresql/data
    networks:
      - checkout-service-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${DB_USER}', '-d', '${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  checkout_db_data:

networks:
  checkout-service-network:
    driver: bridge
    