name: payments-service

services:
  payments-service-db:
    container_name: payments-service-db
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-payments_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-postgres}
    ports:
      - '${DB_PORT:-5434}:5432'
    volumes:
      - ./payments_db_data:/var/lib/postgresql/data
    networks:
      - payments-service-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${DB_USER}', '-d', '${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  payments_db_data:

networks:
  payments-service-network:
    driver: bridge
    